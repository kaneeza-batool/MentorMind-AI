name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ──────────────────────────────────────────────────────────
  backend:
    name: Backend — lint & import check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Lint (ruff)
        run: ruff check . --select E,W,F --ignore E501

      - name: Import check — all agents
        env:
          GROQ_API_KEY: dummy-key-for-ci
        run: |
          python -c "
          from agents.strategist_agent import StrategistAgent
          from agents.mentor_agent import MentorAgent
          from agents.examiner_agent import ExaminerAgent
          from agents.coach_agent import CoachAgent
          from agents.resource_agent import ResourceAgent
          from agents.reflection_agent import ReflectionAgent
          from models.schemas import (
            DashboardResponse, ResourceSchema, ReflectResponse,
          )
          from models.state import LearningSession
          print('All imports OK')
          s = StrategistAgent(); c = CoachAgent(); r = ResourceAgent()
          print('strategist:', s.config['status'])
          print('coach:', c.config['status'])
          print('resource:', r.config['status'])
          result = c.analyze('t1', 85.0, 4, 5, [], 0.0, [])
          assert result['passed'], 'Coach: 85% should pass'
          assert result['new_mastery'] == 34.0, f\"Mastery mismatch: {result['new_mastery']}\"
          print('CoachAgent logic OK')
          "

  # ── Frontend ─────────────────────────────────────────────────────────
  frontend:
    name: Frontend — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000
